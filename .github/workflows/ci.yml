name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: gofmt -l . | (! grep .)
      - run: go test -race -cover ./...

  integration:
    name: integration tests (mysql + redis + kafka)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: flashdeal
          MYSQL_USER: flashdeal
          MYSQL_PASSWORD: flashdeal
        ports: ['3307:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ['6380:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Apply migration
        run: |
          mysql -h127.0.0.1 -P3307 -uflashdeal -pflashdeal flashdeal < migrations/001_init.up.sql
      - name: Run integration tests (mysql + redis only)
        run: go test -tags=integration -race ./internal/repo/... ./internal/infra/mysql/... ./internal/infra/redis/... ./internal/middleware/...
